<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/1779/1779940.png" type="image/x-icon">
    <title>Weather API</title>
</head>
<body>
    <div class="wrapper">
        <div class="frame">
            <div class="top">
                <p><span class="date">Monday, Jan 25, 2023</span></p>
                <img src="" alt="" class="icon" srcset="">
                <p class="con"></p>
                <h1 class="degree"><span class="value">20</span>°C</h1>
                <p class="place"><span class="content">Dalas, Labo Camarines Norte</span></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
